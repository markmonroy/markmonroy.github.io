<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mark in NYC</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; 
            background-color: #000; 
        }

        .fullscreen-photo {
            width: 100vw;       
            height: 100vh;      
            object-fit: cover;  
            object-position: right center; 
            
            display: block;     
        }
    </style>
</head>
<body>

    <img src="mnyc.jpg" 
         alt="Mark in NYC" 
         class="fullscreen-photo">

</body>
</html>
